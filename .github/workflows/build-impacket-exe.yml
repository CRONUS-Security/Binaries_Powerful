name: Build Impacket Examples EXE

on:
    workflow_dispatch:
    # diable auto build
    # push:
    #     branches:
    #         - main
    #         - master

permissions:
    contents: write

env:
  NUITKA_JOBS: "4"

jobs:
    build:
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.9", "3.12"]
                packager: ["pyinstaller", "nuitka"]

        steps:
            - name: Checkout current repository
              uses: actions/checkout@v4

            - name: Setup Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
                  # cache: pip

            - name: Clone impacket source
              shell: pwsh
              run: |
                  git clone --depth 1 https://github.com/fortra/impacket.git

            - name: Install dependencies
              shell: pwsh
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -r .\impacket\requirements.txt
                  python -m pip install .\impacket
                  python -m pip install pyinstaller nuitka ordered-set zstandard

            - name: Cache Nuitka depends.exe
              if: matrix.packager == 'nuitka'
              uses: actions/cache@v4
              with:
                  path: ~\AppData\Local\Nuitka\Nuitka\Cache\downloads\depends
                  key: nuitka-depends-x86_64

            - name: Build EXE files with ${{ matrix.packager }}
              shell: pwsh
              run: |
                  .\script\build-impacket-examples.ps1 `
                    -PythonVersion '${{ matrix.python-version }}' `
                    -Packager '${{ matrix.packager }}' `
                    -ImpacketRoot '.\impacket' `
                    -ScriptListFile '.\script\impacket-examples.txt' `
                    -NuitkaJobs $env:NUITKA_JOBS

            - name: Upload EXE artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: impacket-exes-py${{ matrix.python-version }}-${{ matrix.packager }}
                  path: .\artifacts\*.exe
                  if-no-files-found: error

    publish-release:
        name: Publish artifacts to Release
        runs-on: ubuntu-latest
        needs: build
        if: ${{ always() && needs.build.result == 'success' }}

        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: impacket-exes-*
                  path: release-assets
                  merge-multiple: true

            - name: Update rolling Release assets
              uses: ncipollo/release-action@v1
              with:
                  tag: impacket-latest
                  name: Impacket Latest Build
                  body: |
                      Auto-updated by workflow run: ${{ github.run_id }}
                      Source: fortra/impacket
                  artifactErrorsFailBuild: true
                  artifacts: release-assets/*.exe
                  allowUpdates: true
                  replacesArtifacts: true
                  makeLatest: true
                  token: ${{ secrets.GITHUB_TOKEN }}
